<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL REINO - Augusto Aníbal Toledo</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Source+Serif+4:ital,opsz,wght@300;400;600;700&family=Space+Grotesk:wght@400;700&family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Source Serif 4"', 'Lora', 'serif']
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Source Serif 4', serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #555; border-radius: 20px; }
        
        .poem-content { line-height: 1.9; font-size: 1.1rem; }
        
        .collage-canvas {
            position: relative; width: 100%; min-height: 480px;
            background: radial-gradient(circle at center, rgba(234, 179, 8, 0.08), transparent 70%);
            border: 1px dashed rgba(234, 179, 8, 0.15);
            overflow: hidden; border-radius: 16px;
        }
        .collage-item {
            position: absolute; transform: translate(-50%, -50%);
            transition: all 0.7s cubic-bezier(0.4, 0.0, 0.2, 1);
            text-shadow: 0 2px 12px rgba(0,0,0,0.7);
        }
        .collage-item:hover { transform: translate(-50%, -50%) scale(1.12) rotate(3deg); z-index: 20; }
        @keyframes floatPoem { 0%,100% { transform: translate(-50%, -50%) translateY(0); } 50% { transform: translate(-50%, -50%) translateY(-18px); } }
        .floating { animation: floatPoem 9s ease-in-out infinite; }
    </style>
</head>
<body class="bg-[#0B0B0C] text-[#E4E4E7] min-h-screen">

  <header class="h-24 fixed top-0 left-0 right-0 bg-[#0B0B0C]/95 backdrop-blur-md border-b border-zinc-800 z-50">
    <div class="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
      <div class="flex items-center gap-4">
        <span class="font-mono text-amber-500 tracking-widest text-xs border border-amber-500/30 px-2 py-1 rounded">PORTAL ACTIVO</span>
        <div>
          <h1 class="text-2xl font-light tracking-[0.25em] uppercase">EL REINO</h1>
          <p class="text-[10px] font-mono text-zinc-500">Augusto Aníbal Toledo • 2008-2026</p>
        </div>
      </div>
      <button onclick="toggleView()" id="viewBtn"
              class="px-5 py-2.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-xl text-sm font-mono flex items-center gap-2 transition-all">
        <i class="fa-solid fa-grip"></i>
        <span id="viewText">MALLA</span>
      </button>
    </div>
  </header>

  <div class="pt-24 flex min-h-[calc(100vh-6rem)]">
    
    <div id="gridView" class="hidden flex-1 p-8">
      <div id="poemsGrid" class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>
    </div>

    <div id="readView" class="flex flex-1">
      <main class="flex-1 overflow-y-auto p-8 lg:p-16">
        <div class="max-w-3xl mx-auto" id="poemWrapper">
          <div id="poemMetadataHeader" class="mb-10 flex justify-between items-center text-xs font-mono border-b border-zinc-800 pb-6">
            <span id="poemBookLabel" class="text-amber-500">Cargando Libro...</span>
            <span id="poemRenderBadge" class="text-zinc-500">render: estándar</span>
          </div>
          <h2 id="poemTitle" class="text-4xl font-light tracking-wide mb-10">Cargando poema...</h2>
          <div id="poemBodyContainer" class="poem-content text-zinc-300 whitespace-pre-wrap"></div>
        </div>
      </main>

      <aside class="w-full lg:w-96 border-l border-zinc-800 bg-[#0E0E10] flex flex-col">
        <div class="p-6 border-b border-zinc-800">
          <div class="bg-zinc-950 border border-amber-500/20 rounded-2xl p-5 text-center">
            <span class="text-xs font-mono text-zinc-400">HABITANTES EN EL REINO</span>
            <div id="visitCounter" class="font-mono text-4xl font-bold text-amber-500 mt-2">0000</div>
          </div>
        </div>
        
        <div class="flex-1 flex flex-col min-h-0 p-6">
          <h3 class="font-mono text-xs tracking-widest text-amber-500 mb-4 flex items-center gap-2">
            <i class="fa-regular fa-comment-dots"></i> ECO DE LOS VISITANTES
          </h3>
          <div id="commentsContainer" class="flex-1 overflow-y-auto space-y-4 custom-scrollbar pr-2"></div>
          
          <div class="mt-6 space-y-3">
            <input id="commentUser" type="text" placeholder="Tu seudónimo" 
                   class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-amber-500/50 text-white">
            <div class="relative">
              <textarea id="commentText" rows="3" placeholder="Escribe tu eco..." 
                        class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 text-sm resize-none focus:outline-none focus:border-amber-500/50 text-white"></textarea>
              <button onclick="addComment()" 
                      class="absolute bottom-4 right-4 text-amber-500 hover:text-amber-400">
                <i class="fa-solid fa-paper-plane"></i>
              </button>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <script>
    const supabase = window.supabase.createClient(
      "https://kpvucfktjnuqltuvgflx.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwdnVjZmt0am51cWx0dXZnZmx4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMjk5MzIsImV4cCI6MjA5OTcwNTkzMn0.qV51Slxgz9pRnlGzLQB404SybQz4gOkDIbwSFnNxD-Q"
    );

    let isGrid = false;
    let poemsData = [];
    let localCommentsCache = [];

    // --- CARGAR POEMAS ---
    async function loadPoems() {
      try {
        const { data, error } = await supabase
          .from('poemas')
          .select('key, title, body, book')
          .order('key', { ascending: true }); // Ordenados por su identificador numérico/key

        if (error) throw error;
        poemsData = data || [];
        renderGrid();

        if (poemsData.length > 0) {
          selectPoem(poemsData[0]);
        } else {
          document.getElementById('poemTitle').textContent = "Vacío";
          document.getElementById('poemBodyContainer').textContent = "No hay poemas en la base de datos.";
          document.getElementById('poemBookLabel').textContent = "SISTEMA";
        }
      } catch (err) {
        console.error("Error al cargar poemas:", err);
        document.getElementById('poemTitle').textContent = "Error de Conexión";
        document.getElementById('poemBodyContainer').textContent = "Revisa los permisos RLS en Supabase para la tabla 'poemas'.";
      }
    }

    function renderGrid() {
      const grid = document.getElementById('poemsGrid');
      grid.innerHTML = poemsData.map(poem => `
        <div class="bg-zinc-950 border border-zinc-900 p-6 rounded-2xl hover:border-amber-500/50 cursor-pointer group transition-all" onclick='selectPoemFromData("${poem.key}")'>
          <div class="font-mono text-xs text-amber-500">${poem.book || 'EL REINO'}</div>
          <h3 class="text-xl font-light mt-2 group-hover:text-amber-400">${poem.title}</h3>
        </div>
      `).join('');
    }

    function toggleView() {
      isGrid = !isGrid;
      document.getElementById('gridView').classList.toggle('hidden', !isGrid);
      document.getElementById('readView').classList.toggle('hidden', isGrid);
      document.getElementById('viewText').textContent = isGrid ? 'LECTURA' : 'MALLA';
    }

    function selectPoem(poem) {
      if (isGrid) toggleView();
      document.getElementById('poemTitle').textContent = poem.title;
      document.getElementById('poemBookLabel').textContent = poem.book || 'EL REINO';
      document.getElementById('poemBodyContainer').textContent = poem.body || "Sin contenido";
    }

    window.selectPoemFromData = (key) => {
      const poem = poemsData.find(p => String(p.key) === String(key));
      if (poem) selectPoem(poem);
    };

    // --- CONTADOR DE VISITAS ATMOSFÉRICO ---
    function initVisitCounter() {
      let visits = localStorage.getItem('reino_visits');
      if (!visits) {
        visits = Math.floor(Math.random() * (1200 - 800) + 800); 
      }
      if (!sessionStorage.getItem('session_active')) {
        sessionStorage.setItem('session_active', 'true');
        visits = parseInt(visits) + 1;
      }
      localStorage.setItem('reino_visits', visits);
      document.getElementById('visitCounter').textContent = String(visits).padStart(4, '0');
    }

    // --- CARGAR COMENTARIOS (CORREGIDO CON TUS COLUMNAS REALES) ---
    async function loadComments() {
      try {
        const { data, error } = await supabase
          .from('Comentarios')
          .select('id, user, text, created_at')
          .order('created_at', { ascending: true }); // Orden cronológico usando la columna que tienes

        if (error) throw error;

        if (data) {
          localCommentsCache = data;
          renderComments();
        }
      } catch (err) {
        console.error("Error al cargar comentarios:", err.message);
      }
    }

    function renderComments() {
      const container = document.getElementById('commentsContainer');
      container.innerHTML = '';

      if (localCommentsCache.length === 0) {
        container.innerHTML = `
          <div class="bg-zinc-900/40 p-4 rounded-xl border border-zinc-800/80 text-center text-zinc-500 text-xs">
            Aún no hay ecos. Rompe el silencio...
          </div>
        `;
        return;
      }

      localCommentsCache.forEach(c => {
        const safeUser = (c.user || "Anónimo").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const safeText = (c.text || "").replace(/</g, "&lt;").replace(/>/g, "&gt;");

        container.innerHTML += `
          <div class="bg-zinc-900/60 p-4 rounded-xl border border-zinc-800/60 transition-all">
            <span class="font-mono text-amber-500 text-[10px] tracking-widest uppercase">${safeUser}</span>
            <p class="text-zinc-300 mt-1.5 font-sans leading-relaxed text-sm">${safeText}</p>
          </div>
        `;
      });
      
      container.scrollTop = container.scrollHeight;
    }

    // --- ENVIAR COMENTARIO (CORREGIDO CON TUS COLUMNAS REALES) ---
    async function addComment() {
      const userField = document.getElementById('commentUser');
      const textField = document.getElementById('commentText');
      const username = userField.value.trim() || "Anónimo";
      const commentContent = textField.value.trim();
      
      if (!commentContent) return;

      // Generar una ID temporal numérica única para evitar colisiones
      const numericId = Math.floor(Date.now() / 1000); 

      try {
        const { error } = await supabase
          .from('Comentarios')
          .insert([{ id: numericId, user: username, text: commentContent }]);

        if (error) throw error;

        textField.value = '';
        loadComments(); // Recarga la lista de comentarios tras guardar con éxito
      } catch (err) {
        console.error("Error al transmitir el eco:", err.message);
        alert("El eco no pudo enviarse. Recuerda habilitar la política RLS 'INSERT' para la tabla Comentarios.");
      }
    }

    // Suscripción Realtime para los comentarios
    function subscribeRealtime() {
      supabase
        .channel('schema-db-changes')
        .on(
          'postgres_changes',
          { event: 'INSERT', schema: 'public', table: 'Comentarios' },
          (payload) => {
            if (!localCommentsCache.some(c => c.id === payload.new.id)) {
              localCommentsCache.push(payload.new);
              renderComments();
            }
          }
        )
        .subscribe();
    }

    // --- CARGAR AL INICIAR ---
    window.onload = () => {
      initVisitCounter();
      loadPoems();
      loadComments();
      subscribeRealtime();
    };
  </script>
</body>
</html>
