<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL REINO - Augusto Aníbal Toledo</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Source+Serif+4:ital,opsz,wght@300;400;600;700&family=Space+Grotesk:wght@400;700&family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Source Serif 4"', 'Lora', 'serif'],
                        mono: ['"Space Grotesk"', 'monospace'],
                        code: ['"Fira Code"', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Source Serif 4', serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #444; border-radius: 20px; }
        
        .poem-content { line-height: 1.85; }

        /* === COLLAGE MEJORADO === */
        .collage-canvas {
            position: relative;
            width: 100%;
            min-height: 480px;
            background: radial-gradient(circle at center, rgba(234, 179, 8, 0.08), transparent 70%);
            border: 1px dashed rgba(234, 179, 8, 0.15);
            overflow: hidden;
            border-radius: 16px;
        }
        
        .collage-item {
            position: absolute;
            transform: translate(-50%, -50%);
            transition: all 0.7s cubic-bezier(0.4, 0.0, 0.2, 1);
            user-select: none;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
            cursor: default;
        }
        
        .collage-item:hover {
            transform: translate(-50%, -50%) scale(1.12) rotate(3deg);
            z-index: 20;
        }

        @keyframes floatPoem {
            0%, 100% { transform: translate(-50%, -50%) translateY(0px); }
            50% { transform: translate(-50%, -50%) translateY(-18px); }
        }
        
        .floating {
            animation: floatPoem 9s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-[#0B0B0C] text-[#E4E4E7] min-h-screen">

  <!-- HEADER -->
  <header class="h-24 fixed top-0 left-0 right-0 bg-[#0B0B0C]/95 backdrop-blur-md border-b border-zinc-800 z-50">
    <div class="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
      <div class="flex items-center gap-4">
        <span class="font-mono text-amber-500 tracking-widest text-xs border border-amber-500/30 px-2 py-1 rounded">PORTAL ACTIVO</span>
        <div>
          <h1 class="text-2xl font-light tracking-[0.25em] uppercase">EL REINO</h1>
          <p class="text-[10px] font-mono text-zinc-500">Augusto Aníbal Toledo • 2008-2026</p>
        </div>
      </div>
     
      <button onclick="toggleView()" id="viewBtn"
              class="px-5 py-2.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-xl text-sm font-mono flex items-center gap-2 transition-all">
        <i class="fa-solid fa-grip"></i>
        <span id="viewText">MALLA</span>
      </button>
    </div>
  </header>

  <div class="pt-24">
    <!-- VISTA MALLA -->
    <div id="gridView" class="hidden p-6 md:p-10">
      <div class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="bg-zinc-950 border border-zinc-900 p-6 rounded-2xl hover:border-amber-500/50 cursor-pointer group" onclick="selectPoem('silencio')">
          <div class="font-mono text-xs text-amber-500">EL REINO • SECCIÓN I</div>
          <h3 class="text-xl font-light mt-2 group-hover:text-amber-400">El silencio es lo que hay</h3>
        </div>
        <div class="bg-zinc-950 border border-zinc-900 p-6 rounded-2xl hover:border-rose-500/50 cursor-pointer group" onclick="selectPoem('orbita_i6')">
          <div class="font-mono text-xs text-rose-400">ÓRBITA ROTA</div>
          <h3 class="text-xl font-light mt-2 group-hover:text-rose-400">i6*</h3>
        </div>
      </div>
    </div>

    <!-- VISTA LECTURA -->
    <div id="readView" class="flex min-h-[calc(100vh-6rem)]">
      <main class="flex-1 overflow-y-auto p-8 lg:p-16">
        <div class="max-w-3xl mx-auto" id="poemWrapper">
          <div id="poemMetadataHeader" class="mb-10 flex justify-between items-center text-xs font-mono border-b border-zinc-800 pb-6">
            <span id="poemBookLabel" class="text-amber-500">EL REINO</span>
            <span id="poemRenderBadge" class="text-zinc-500">render: estándar</span>
          </div>
          
          <h2 id="poemTitle" class="text-4xl font-light tracking-wide mb-10"></h2>
          <div id="poemBodyContainer" class="poem-content text-lg text-zinc-300"></div>
        </div>
      </main>

      <!-- SIDEBAR -->
      <aside class="w-full lg:w-96 border-l border-zinc-800 bg-[#0E0E10] flex flex-col h-[calc(100vh-6rem)] sticky top-24">
        <div class="p-6 border-b border-zinc-800">
          <div class="bg-zinc-950 border border-amber-500/20 rounded-2xl p-5 text-center">
            <span class="text-xs font-mono text-zinc-400">HABITANTES EN EL REINO</span>
            <div id="visitCounter" class="font-mono text-4xl font-bold text-amber-500 mt-2">1423</div>
          </div>
        </div>
        
        <div class="flex-1 flex flex-col min-h-0 p-6">
          <h3 class="font-mono text-xs tracking-widest text-amber-500 mb-4 flex items-center gap-2">
            <i class="fa-regular fa-comment-dots"></i> ECO DE LOS VISITANTES
          </h3>
          <div id="commentsContainer" class="flex-1 overflow-y-auto space-y-4 custom-scrollbar pr-2"></div>
          
          <div class="mt-6 space-y-3">
            <input id="commentUser" type="text" placeholder="Tu seudónimo" 
                   class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-amber-500">
            <div class="relative">
              <textarea id="commentText" rows="3" placeholder="Escribe tu eco..."
                        class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 text-sm resize-none focus:outline-none focus:border-amber-500"></textarea>
              <button onclick="addComment()" 
                      class="absolute bottom-4 right-4 text-amber-500 hover:text-amber-400">
                <i class="fa-solid fa-paper-plane"></i>
              </button>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <script>
    const supabase = window.supabase.createClient(
      "https://kpvucfktjnuqltuvgflx.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwdnVjZmt0am51cWx0dXZnZmx4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMjk5MzIsImV4cCI6MjA5OTcwNTkzMn0.qV51Slxgz9pRnlGzLQB404SybQz4gOkDIbwSFnNxD-Q"
    );

    let isGrid = false;

    const catalog = {
      silencio: {
        title: "EL SILENCIO ES LO QUE HAY",
        book_title: "EL REINO - SECCIÓN I",
        tipo_render: "preformateado",
        body_raw: `Alto, piedra, acantilado
eso era yo, también
pradera, susurro y hoguera...`
      },
      orbita_i6: {
        title: "i6*",
        book_title: "ÓRBITA ROTA (2019)",
        tipo_render: "collage_libre",
        body_raw: "Representación libre de colisiones espaciales.",
        metadatos_diseno: {
          aspect_ratio: "16/9",
          elementos: [
            { texto: "ʘ_o", x: 20, y: 25, size: "2.2rem", color: "#f59e0b", weight: "bold" },
            { texto: "el centro no resiste", x: 55, y: 45, size: "1.35rem", color: "#e2e8f0", style: "italic" },
            { texto: "[ GRAVEDAD CERO ]", x: 30, y: 70, size: "1.1rem", color: "#a1a1aa", font: "font-mono" },
            { texto: "i = 0 (infinito)", x: 75, y: 35, size: "1.15rem", color: "#ec4899" },
            { texto: "colisión", x: 15, y: 80, size: "1.05rem", color: "#eab308" }
          ]
        }
      }
    };

    function toggleView() {
      isGrid = !isGrid;
      document.getElementById('gridView').classList.toggle('hidden', !isGrid);
      document.getElementById('readView').classList.toggle('hidden', isGrid);
      document.getElementById('viewText').textContent = isGrid ? 'LECTURA' : 'MALLA';
    }

    function selectPoem(key) {
      const poema = catalog[key];
      if (!poema) return;

      // Forzar vista lectura
      if (isGrid) toggleView();

      document.getElementById('poemTitle').textContent = poema.title;
      document.getElementById('poemBookLabel').textContent = poema.book_title || 'EL REINO';
      document.getElementById('poemRenderBadge').textContent = `render: ${poema.tipo_render}`;

      const container = document.getElementById('poemBodyContainer');
      container.innerHTML = '';

      if (poema.tipo_render === 'collage_libre') {
        container.className = "w-full";
        const canvas = document.createElement('div');
        canvas.className = "collage-canvas";
        canvas.style.aspectRatio = poema.metadatos_diseno.aspect_ratio || "16/9";

        poema.metadatos_diseno.elementos.forEach((el, index) => {
          const item = document.createElement('span');
          item.className = `collage-item text-xl ${el.font || ''} floating`;
          item.style.left = `${el.x}%`;
          item.style.top = `${el.y}%`;
          item.style.fontSize = el.size || '1.2rem';
          item.style.fontWeight = el.weight || '300';
          item.style.fontStyle = el.style || 'normal';
          item.style.color = el.color || '#E4E4E7';
          item.style.animationDelay = `${index * 1.2}s`;
          item.textContent = el.texto;
          canvas.appendChild(item);
        });

        container.appendChild(canvas);
      } else {
        // Renderizado normal (puedes expandir después)
        container.className = "poem-content text-lg text-zinc-300 whitespace-pre-wrap";
        container.textContent = poema.body_raw;
      }
    }

    // === Funciones pendientes (mantén tus versiones originales) ===
    function initVisitCounter() { /* tu código */ }
    async function loadComments() { /* tu código */ }
    async function addComment() { /* tu código */ }

    window.onload = () => {
      initVisitCounter();
      loadComments();
      selectPoem('orbita_i6');   // ← Inicia con el collage mejorado
    };
  </script>
</body>
</html>
